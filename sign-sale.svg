<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <!-- Hanging wire -->
  <line x1="100" y1="0" x2="100" y2="25" stroke="#888" stroke-width="3"/>
  <line x1="200" y1="0" x2="200" y2="25" stroke="#888" stroke-width="3"/>
  <!-- Sign -->
  <rect x="0" y="22" width="300" height="175" rx="12" fill="#E23A29" stroke="#1A1A1A" stroke-width="4"/>
  <!-- Yellow band top -->
  <rect x="0" y="22" width="300" height="38" rx="12" fill="#F1AD2B" stroke="none"/>
  <rect x="0" y="42" width="300" height="18" fill="#F1AD2B"/>
  <text font-family="sans-serif" font-weight="900" font-size="20" fill="#1A1A1A" text-anchor="middle" x="150" y="50">★ TODAY ONLY ★</text>
  <!-- SALE text -->
  <text font-family="sans-serif" font-weight="900" font-size="90" fill="white" text-anchor="middle" x="150" y="162" letter-spacing="-4">SALE</text>
  <!-- Outline effect -->
  <text font-family="sans-serif" font-weight="900" font-size="90" fill="none" stroke="#1A1A1A" stroke-width="4" text-anchor="middle" x="150" y="162" letter-spacing="-4">SALE</text>
</svg>