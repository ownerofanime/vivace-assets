<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <!-- Card body -->
  <rect x="0" y="0" width="320" height="180" rx="16" fill="#3C73D6" stroke="#1A1A1A" stroke-width="4"/>
  <!-- Top stripe -->
  <rect x="0" y="0" width="320" height="52" rx="16" fill="#E23A29"/>
  <rect x="0" y="36" width="320" height="16" fill="#E23A29"/>
  <text font-family="sans-serif" font-weight="900" font-size="20" fill="white" x="20" y="32">VIVACE LOYALTY CARD</text>
  <!-- Stamp circles -->
  <circle cx="44"  cy="108" r="24" fill="#F1AD2B" stroke="#1A1A1A" stroke-width="2.5"/>
  <circle cx="104" cy="108" r="24" fill="#F1AD2B" stroke="#1A1A1A" stroke-width="2.5"/>
  <circle cx="164" cy="108" r="24" fill="#F1AD2B" stroke="#1A1A1A" stroke-width="2.5"/>
  <circle cx="224" cy="108" r="24" fill="white"   stroke="#1A1A1A" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="284" cy="108" r="24" fill="white"   stroke="#1A1A1A" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- Stamps (✓ marks on filled circles) -->
  <text font-family="sans-serif" font-weight="900" font-size="22" fill="#E23A29" text-anchor="middle" x="44"  y="116">✓</text>
  <text font-family="sans-serif" font-weight="900" font-size="22" fill="#E23A29" text-anchor="middle" x="104" y="116">✓</text>
  <text font-family="sans-serif" font-weight="900" font-size="22" fill="#E23A29" text-anchor="middle" x="164" y="116">✓</text>
  <!-- Bottom text -->
  <text font-family="sans-serif" font-size="11" fill="white" x="20" y="158" opacity="0.8">Collect 5 stamps for a FREE mystery CCA gift!</text>
</svg>